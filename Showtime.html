body {

    color: white;
}

/* TITLE */
.header {
    text-align: center;
    font-size: 45px;
    font-weight: bold;
    padding: 20px;
    color: #00ffd5;
}

/* FILTER */
.filter-btns {
    text-align: center;
    margin-bottom: 20px;
}
.filter-btns button {
    margin: 5px;
}

/* CARD */
.movie-card {
    background: rgba(255,255,255,0.08);
    border-radius: 15px;
    overflow: hidden;
    transition: 0.3s;
}
.movie-card:hover {
    transform: scale(1.05);
}

/* IMAGE */
.movie-card img {
    width: 100%;
    height: 240px;
    object-fit: cover;
}

/* MOVIE NAME BUTTON */
.name-btn {
    width: 100%;
    margin-bottom: 5px;
    background: #ffffff;
    color: #000;
    font-weight: bold;
    border: none;
    border-radius: 8px;
    padding: 6px;
}

/* WATCH BUTTON */
.watch-btn {
    width: 100%;
    background: #00ffd5;
    border: none;
    font-weight: bold;
}
.watch-btn:hover {
    background: #00bfa6;
    color: white;
}
</style>

<script>
function filterMovies(category) {
    let movies = document.querySelectorAll('.movie');

    movies.forEach(movie => {
        if (category === 'all') {
            movie.style.display = 'block';
        } else {
            movie.style.display = movie.classList.contains(category) ? 'block' : 'none';
        }
    });
}
</script>
